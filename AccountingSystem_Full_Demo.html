<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Advanced Accounting System — Full Demo</title>
<style>
:root{--primary:#1e40af;--primary-light:#3b82f6;--accent:#0ea5e9;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--sidebar:#0f172a;--sidebar-text:#94a3b8;--sidebar-active:#1e293b;--bg:#f1f5f9;--card:#ffffff;--border:#e2e8f0;--text:#0f172a;--text-muted:#64748b;--shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
#sidebar{width:240px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.logo{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
.logo h2{color:#fff;font-size:15px;font-weight:700}
.logo p{color:var(--sidebar-text);font-size:11px;margin-top:2px}
.nav-section{padding:12px 12px 4px;font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.08em}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--sidebar-text);transition:all .15s;border:none;background:none;width:calc(100% - 16px);text-align:left}
.nav-item:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.nav-item.active{background:var(--primary);color:#fff}
.nav-item .icon{font-size:16px;min-width:20px;text-align:center}
.nav-item .badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;padding:1px 6px;border-radius:50px;font-weight:700}
/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:18px;font-weight:700;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:12px}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;cursor:pointer}
#content{flex:1;overflow-y:auto;padding:24px}
/* CARDS */
.card{background:var(--card);border-radius:12px;box-shadow:var(--shadow);border:1px solid var(--border)}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:15px;font-weight:700}
.card-body{padding:20px}
/* GRID */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
/* KPI */
.kpi{background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--border);box-shadow:var(--shadow)}
.kpi-label{font-size:12px;color:var(--text-muted);font-weight:600;margin-bottom:6px}
.kpi-value{font-size:1.8rem;font-weight:800;margin-bottom:4px}
.kpi-sub{font-size:12px;color:var(--text-muted)}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#059669}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{background:var(--bg)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8fafc;padding:10px 14px;text-align:left;font-weight:600;font-size:12px;color:var(--text-muted);border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:#f8fafc}
tr:last-child td{border-bottom:none}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:50px;font-size:11px;font-weight:600}
.badge-success{background:#dcfce7;color:#166534}
.badge-danger{background:#fee2e2;color:#991b1b}
.badge-warning{background:#fef9c3;color:#854d0e}
.badge-info{background:#dbeafe;color:#1e40af}
.badge-gray{background:#f1f5f9;color:#475569}
/* FORMS */
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px}
input,select,textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff;color:var(--text);transition:border .15s;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:720px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 25px 50px rgba(0,0,0,.25)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:16px;font-weight:700}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}
.close-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:20px;line-height:1;padding:2px}
.close-btn:hover{color:var(--text)}
/* BALANCE INDICATOR */
.balance-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:12px}
.balance-ok{background:#dcfce7;color:#166534}
.balance-err{background:#fee2e2;color:#991b1b}
/* JOURNAL LINE */
.je-line{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px}
.je-line input{margin:0}
/* TOTALS ROW */
.totals-row{background:#f8fafc!important}
.totals-row td{font-weight:700;border-top:2px solid var(--border)!important}
/* REPORT SECTION */
.report-section{margin-bottom:24px}
.report-section-header{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;padding:8px 0;border-bottom:2px solid var(--border);margin-bottom:8px}
.report-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;border-bottom:1px solid #f1f5f9}
.report-row:last-child{border-bottom:none}
.report-total{display:flex;justify-content:space-between;padding:10px 0;font-size:15px;font-weight:700;border-top:2px solid var(--border);border-bottom:3px double var(--border);margin-top:4px}
.report-subtotal{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;font-weight:600;border-top:1px solid var(--border);margin-top:4px}
.amount{font-family:'Courier New',monospace;color:var(--text)}
.amount.neg{color:var(--danger)}
.amount.pos{color:var(--success)}
/* TABS */
.tabs{display:flex;gap:4px;background:#f1f5f9;padding:4px;border-radius:10px;margin-bottom:20px;width:fit-content}
.tab{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-muted);border:none;background:none;transition:all .15s}
.tab.active{background:#fff;color:var(--primary);box-shadow:var(--shadow)}
/* PO WORKFLOW */
.po-steps{display:flex;align-items:center;gap:0;margin:12px 0}
.po-step{flex:1;text-align:center;font-size:11px;padding:6px 4px;border-radius:6px}
.po-step.done{background:#dcfce7;color:#166534}
.po-step.current{background:#dbeafe;color:#1e40af;font-weight:700}
.po-step.pending{background:#f1f5f9;color:#94a3b8}
.po-arrow{color:#94a3b8;font-size:12px;flex-shrink:0;padding:0 4px}
/* ACCOUNT TREE */
.acc-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;transition:background .1s}
.acc-row:hover{background:#f1f5f9}
.acc-row.parent{font-weight:600;background:#f8fafc}
.acc-indent{display:flex;flex-direction:column;padding-left:20px;border-left:2px solid #e2e8f0;margin-left:14px}
.acc-expand{cursor:pointer;color:var(--text-muted);font-size:12px;min-width:16px}
/* ALERT */
.alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px}
.alert-info{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}
.alert-success{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.alert-warning{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
/* CHART SIMPLE */
.mini-chart{display:flex;align-items:flex-end;gap:4px;height:60px;padding:4px 0}
.mini-bar{flex:1;border-radius:3px 3px 0 0;min-width:8px;background:var(--primary-light);opacity:.7;transition:opacity .15s}
.mini-bar:hover{opacity:1}
/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
/* DATE FILTER BAR */
.filter-bar{display:flex;align-items:flex-end;gap:12px;padding:16px;background:#f8fafc;border-radius:10px;margin-bottom:20px}
.filter-bar .form-group{margin:0;flex:1}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}
/* RESPONSIVE helper */
.flex{display:flex} .items-center{align-items:center} .gap-2{gap:8px} .gap-3{gap:12px} .ml-auto{margin-left:auto} .mb-4{margin-bottom:16px} .mb-6{margin-bottom:24px} .mt-2{margin-top:8px} .mt-4{margin-top:16px} .w-full{width:100%} .text-right{text-align:right} .text-sm{font-size:13px} .text-xs{font-size:11px} .font-bold{font-weight:700} .text-muted{color:var(--text-muted)}
</style>
</head>

// ============================================================
// ACCOUNTING ENGINE
// ============================================================
function getAccountById(id){ return accounts.find(a=>a.id===id); }
function getAccountByCode(code){ return accounts.find(a=>a.code===code); }

// Get all descendant IDs of an account
function getDescendants(accountId){
  const children = accounts.filter(a=>a.parent===accountId).map(a=>a.id);
  return children.reduce((all,cid)=>[...all,cid,...getDescendants(cid)],children);
}

// Calculate raw debit/credit totals for a leaf account
function getAccountTotals(accountId, startDate, endDate){
  let debit=0,credit=0;
  for(const je of journalEntries){
    if(startDate && je.date < startDate) continue;
    if(endDate   && je.date > endDate)   continue;
    for(const line of je.lines){
      if(line.acc === accountId){
        debit  += line.debit  || 0;
        credit += line.credit || 0;
      }
    }
  }
  return {debit:Math.round(debit*100)/100, credit:Math.round(credit*100)/100};
}

// Net balance respecting normal balance
function getAccountBalance(accountId, startDate, endDate){
  const acc = getAccountById(accountId);
  if(!acc) return 0;
  if(acc.is_header){
    const kids = getDescendants(accountId);
    return kids.reduce((s,kid)=>s+getAccountBalance(kid,startDate,endDate),0);
  }
  const {debit,credit} = getAccountTotals(accountId,startDate,endDate);
  const normalDebit = ACCOUNT_TYPES[acc.type]?.normal === 'debit';
  return Math.round((normalDebit ? debit-credit : credit-debit)*100)/100;
}

// Grand total debit/credit (for trial balance)
function getGrandTotals(startDate,endDate){
  let td=0,tc=0;
  for(const je of journalEntries){
    if(startDate && je.date < startDate) continue;
    if(endDate   && je.date > endDate)   continue;
    for(const line of je.lines){td+=line.debit||0;tc+=line.credit||0;}
  }
  return {debit:Math.round(td*100)/100,credit:Math.round(tc*100)/100};
}

function fmt(n){
  if(n===undefined||n===null) return '-';
  const abs=Math.abs(n);
  const s=abs.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return n<0?`(${s})`:s;
}
function fmtUSD(n){return '$'+fmt(n);}

  const td=jeLines.reduce((s,l)=>s+(parseFloat(l.debit)||0),0);

  const diff=Math.abs(td-tc);

  if(bar){
    bar.className=`balance-bar ${bal?'balance-ok':'balance-err'}`;
    bar.textContent=`Debit: ${fmtUSD(td)} | Credit: ${fmtUSD(tc)} | ${bal?'✅ BALANCED':'❌ Difference: '+fmtUSD(diff)}`;

function saveJE(){
  const date=document.getElementById('je-date')?.value;
  const desc=document.getElementById('je-desc')?.value;
  // Read current values from DOM inputs
  document.querySelectorAll('#je-lines-container .je-line').forEach((row,i)=>{
    const sel=row.querySelector('select');
    const inputs=row.querySelectorAll('input');
    if(jeLines[i]){
      jeLines[i].acc=sel?sel.value:'';
      jeLines[i].debit=parseFloat(inputs[0]?.value)||0;
      jeLines[i].credit=parseFloat(inputs[1]?.value)||0;
    }
  });
  if(!date){alert('Please enter a date.');return;}
  if(!desc){alert('Please enter a description.');return;}
  const validLines=jeLines.filter(l=>l.acc&&(l.debit>0||l.credit>0));
  if(validLines.length<2){alert('Please add at least 2 lines with amounts.');return;}
  const td=validLines.reduce((s,l)=>s+(l.debit||0),0);
  const tc=validLines.reduce((s,l)=>s+(l.credit||0),0);
  if(Math.abs(td-tc)>0.01){
    if(!confirm(`⚠️ This entry is NOT balanced!\nDebit: ${fmtUSD(td)}\nCredit: ${fmtUSD(tc)}\nDifference: ${fmtUSD(Math.abs(td-tc))}\n\nSave anyway?`)) return;
  }
  if(editingJE){
    const idx=journalEntries.findIndex(e=>e.id===editingJE);
    if(idx>=0){journalEntries[idx]={...journalEntries[idx],date,desc,lines:validLines};}
  } else {
    const maxNum=journalEntries.reduce((m,e)=>Math.max(m,parseInt(e.number.replace('JE-',''))||0),0);
    const num='JE-'+String(maxNum+1).padStart(3,'0');
    journalEntries.push({id:num,number:num,date,desc,lines:validLines});
  }
  save();closeModal();renderJEList();
}
function deleteJE(id){
  if(!confirm('Delete this journal entry? This cannot be undone.')) return;
  journalEntries=journalEntries.filter(e=>e.id!==id);
  save();renderJEList();
}

function renderAccountTree(parentId,depth){
  const kids=accounts.filter(a=>a.parent===parentId).sort((a,b)=>a.code.localeCompare(b.code));
  if(!kids.length) return '';
  return kids.map(acc=>{
    const hasKids=accounts.some(a=>a.parent===acc.id);
    const bal=getAccountBalance(acc.id,null,null);
    const t=ACCOUNT_TYPES[acc.type]||{color:'#64748b',bg:'#f1f5f9'};
    const exp=expandedAccounts.has(acc.id);
    return `<div>
      <div class="acc-row" style="padding-left:${16+depth*20}px">
        ${hasKids?`<span class="acc-expand" onclick="toggleAccExpand('${acc.id}')">${exp?'▼':'▶'}</span>`:'<span style="min-width:16px;display:inline-block"></span>'}
        ${acc.is_header?`<span style="font-size:13px">📁</span>`:`<span style="font-size:13px">📄</span>`}
        <span style="font-family:monospace;font-size:12px;color:#94a3b8;min-width:60px">${acc.code}</span>
        <span class="${acc.is_header?'font-bold':''}" style="flex:1">${acc.name}</span>
        <span class="badge" style="background:${t.bg};color:${t.color};margin-right:8px;font-size:10px">${acc.type}</span>
        <span style="font-family:monospace;font-size:13px;min-width:120px;text-align:right;color:${bal>=0?'#10b981':'#ef4444'}">${fmtUSD(bal)}</span>
        <span style="min-width:80px;text-align:right">
          <button class="btn btn-xs btn-danger" onclick="deleteAccount('${acc.id}')" title="Delete">🗑</button>
        </span>
      </div>
      ${exp&&hasKids?`<div>${renderAccountTree(acc.id,depth+1)}</div>`:''}
    </div>`;
  }).join('');
}
function toggleAccExpand(id){
  if(expandedAccounts.has(id)) expandedAccounts.delete(id); else expandedAccounts.add(id);
  renderCOA();
}
function openNewAccount(){
  const parentOpts=accounts.map(a=>`<option value="${a.id}">${a.code} — ${a.name.split('/')[0].trim()}</option>`).join('');
  openModal('➕ New Account',`

<div class="form-group"><label>Account Name (Arabic / English)</label><input type="text" id="acc-name" placeholder="e.g. حساب جديد / New Account"></div>
<div class="form-group"><label>Account Type</label>
  <select id="acc-type">${Object.keys(ACCOUNT_TYPES).map(t=>`<option value="${t}">${t}</option>`).join('')}</select>
</div>
<div class="form-group"><label>Parent Account (optional)</label>
  <select id="acc-parent"><option value="">— No Parent (Root) —</option>${parentOpts}</select>
</div>
<div class="form-group"><label><input type="checkbox" id="acc-header"> Header account (no direct transactions)</label></div>
`,`<button class="btn btn-outline" onclick="closeModal()">Cancel</button>
   <button class="btn btn-primary" onclick="saveNewAccount()">Save Account</button>`);
}
function saveNewAccount(){
  const code=document.getElementById('acc-code').value.trim();
  const name=document.getElementById('acc-name').value.trim();
  const type=document.getElementById('acc-type').value;
  const parent=document.getElementById('acc-parent').value||null;
  const isHeader=document.getElementById('acc-header').checked;
  if(!code||!name){alert('Code and name are required.');return;}
  if(accounts.find(a=>a.code===code)){alert('Account code already exists.');return;}
  const id='acc-'+Date.now();
  accounts.push({id,code,name,type,parent,is_header:isHeader});
  save();closeModal();renderCOA();
}
function deleteAccount(id){
  const hasLines=journalEntries.some(je=>je.lines.some(l=>l.acc===id));
  if(hasLines){alert('Cannot delete: this account has journal entry lines.');return;}
  if(!confirm('Delete this account?')) return;
  accounts=accounts.filter(a=>a.id!==id);
  save();renderCOA();
}

function buildCashFlow(){
  const sd=document.getElementById('cf-sd')?.value;
  const ed=document.getElementById('cf-ed')?.value;
  // Operating = Revenue - Expenses (net income)
  const totalRev=accounts.filter(a=>a.type==='Revenue'&&!a.is_header).reduce((s,a)=>s+getAccountBalance(a.id,sd,ed),0);
  const totalExp=accounts.filter(a=>a.type==='Expense'&&!a.is_header).reduce((s,a)=>s+getAccountBalance(a.id,sd,ed),0);
  const operating=totalRev-totalExp;
  // Investing = changes in fixed assets
  const fixedAssets=accounts.filter(a=>a.type==='Asset'&&!a.is_header&&a.parent==='1050');
  const investing=-fixedAssets.reduce((s,a)=>s+getAccountBalance(a.id,sd,ed),0);
  // Financing = changes in equity + loans
  const equityChange=accounts.filter(a=>a.type==='Equity'&&!a.is_header).reduce((s,a)=>s+getAccountBalance(a.id,sd,ed),0);
  const loanChange=accounts.filter(a=>a.type==='Liability'&&!a.is_header).reduce((s,a)=>s+getAccountBalance(a.id,sd,ed),0);
  const financing=equityChange+loanChange;
  const netChange=operating+investing+financing;
  document.getElementById('cf-content').innerHTML=`
<div class="card" style="max-width:700px">
  <div class="card-header">
    <div><div class="card-title">💧 Cash Flow Statement</div><div class="text-xs text-muted">${sd} to ${ed}</div></div>
  </div>
  <div class="card-body">
    <div class="report-section">
      <div class="report-section-header">Operating Activities / الأنشطة التشغيلية</div>
      <div class="report-row"><span>Net Revenue</span><span class="amount pos">${fmtUSD(totalRev)}</span></div>
      <div class="report-row"><span>Total Expenses</span><span class="amount neg">(${fmtUSD(totalExp)})</span></div>
      <div class="report-subtotal"><span>Net Cash from Operations</span><span class="amount ${operating>=0?'pos':'neg'}">${operating>=0?fmtUSD(operating):'('+fmtUSD(Math.abs(operating))+')'}</span></div>
    </div>
    <div class="report-section">
      <div class="report-section-header">Investing Activities / الأنشطة الاستثمارية</div>
      ${fixedAssets.map(a=>{const b=getAccountBalance(a.id,sd,ed);return b?`<div class="report-row"><span>${a.name}</span><span class="amount neg">(${fmtUSD(b)})</span></div>`:''}).join('')||'<div class="report-row text-muted">No investing activities</div>'}
      <div class="report-subtotal"><span>Net Cash from Investing</span><span class="amount ${investing>=0?'pos':'neg'}">${investing>=0?fmtUSD(investing):'('+fmtUSD(Math.abs(investing))+')'}</span></div>
    </div>
    <div class="report-section">
      <div class="report-section-header">Financing Activities / الأنشطة التمويلية</div>
      <div class="report-row"><span>Equity Changes</span><span class="amount">${fmtUSD(equityChange)}</span></div>
      <div class="report-row"><span>Loan Changes</span><span class="amount">${fmtUSD(loanChange)}</span></div>
      <div class="report-subtotal"><span>Net Cash from Financing</span><span class="amount ${financing>=0?'pos':'neg'}">${financing>=0?fmtUSD(financing):'('+fmtUSD(Math.abs(financing))+')'}</span></div>
    </div>
    <div class="report-total">
      <span>NET CHANGE IN CASH</span>
      <span class="amount ${netChange>=0?'pos':'neg'}">${netChange>=0?fmtUSD(netChange):'('+fmtUSD(Math.abs(netChange))+')'}</span>
    </div>
  </div>
</div>`;
}

function renderGL(){
  const leafAccs=accounts.filter(a=>!a.is_header);
  const accOpts=leafAccs.map(a=>`<option value="${a.id}">${a.code} — ${a.name.split('/')[0].trim()}</option>`).join('');
  const now=new Date();
  document.getElementById('content').innerHTML=`
<div class="filter-bar mb-4">
  <div class="form-group" style="flex:2"><label>Account</label><select id="gl-acc">${accOpts}</select></div>
  <div class="form-group"><label>Start Date</label><input type="date" id="gl-sd" value="${now.getFullYear()+'-01-01'}"></div>
  <div class="form-group"><label>End Date</label><input type="date" id="gl-ed" value="${now.toISOString().split('T')[0]}"></div>
  <button class="btn btn-primary" onclick="buildGL()">View Ledger</button>
</div>
<div id="gl-content"></div>`;
  buildGL();
}
function buildGL(){
  const accId=document.getElementById('gl-acc')?.value;
  const sd=document.getElementById('gl-sd')?.value;
  const ed=document.getElementById('gl-ed')?.value;
  if(!accId) return;
  const acc=getAccountById(accId);
  const t=ACCOUNT_TYPES[acc?.type]||{color:'#64748b',bg:'#f1f5f9',normal:'debit'};
  let running=0;
  const ledgerRows=[];
  const filteredJE=journalEntries.filter(je=>{
    if(sd && je.date<sd) return false;
    if(ed && je.date>ed) return false;
    return je.lines.some(l=>l.acc===accId);
  }).sort((a,b)=>a.date.localeCompare(b.date));
  for(const je of filteredJE){
    for(const line of je.lines){
      if(line.acc!==accId) continue;
      const d=line.debit||0, c=line.credit||0;
      running += t.normal==='debit' ? d-c : c-d;
      ledgerRows.push({date:je.date,num:je.number,desc:je.desc,debit:d,credit:c,running});
    }
  }
  const totalD=ledgerRows.reduce((s,r)=>s+r.debit,0);
  const totalC=ledgerRows.reduce((s,r)=>s+r.credit,0);
  document.getElementById('gl-content').innerHTML=`
<div class="card">
  <div class="card-header">
    <div>
      <div class="card-title">📖 General Ledger: ${acc?.name||accId}</div>
      <div class="text-xs text-muted">${acc?.code} | ${sd} to ${ed}</div>
    </div>
    <span class="badge" style="background:${t.bg};color:${t.color}">${acc?.type}</span>
  </div>
  <div class="card-body" style="padding:0">
    <div class="table-wrap">
    <table><thead><tr><th>Date</th><th>Entry #</th><th>Description</th><th class="text-right">Debit</th><th class="text-right">Credit</th><th class="text-right">Balance</th></tr></thead>
    <tbody>
    ${ledgerRows.map(r=>`<tr>
      <td class="text-muted">${r.date}</td>
      <td><span style="font-family:monospace;color:#1e40af">${r.num}</span></td>
      <td style="max-width:200px">${r.desc}</td>
      <td class="text-right" style="color:#10b981;font-family:monospace">${r.debit?fmtUSD(r.debit):'-'}</td>
      <td class="text-right" style="color:#3b82f6;font-family:monospace">${r.credit?fmtUSD(r.credit):'-'}</td>
      <td class="text-right" style="font-family:monospace;color:${r.running>=0?'#10b981':'#ef4444'}">${fmtUSD(r.running)}</td>
    </tr>`).join('')||'<tr><td colspan="6" class="empty">No transactions for this account in the selected period.</td></tr>'}
    <tr class="totals-row"><td colspan="3"><strong>TOTALS</strong></td><td class="text-right" style="color:#10b981;font-family:monospace"><strong>${fmtUSD(totalD)}</strong></td><td class="text-right" style="color:#3b82f6;font-family:monospace"><strong>${fmtUSD(totalC)}</strong></td><td class="text-right" style="font-family:monospace"><strong>${fmtUSD(running)}</strong></td></tr>
    </tbody></table>
    </div>
  </div>
</div>`;
}

// ============================================================
// PURCHASE ORDERS
// ============================================================
function renderPO(){
  const statusCls={approved:'badge-success',pending:'badge-warning',rejected:'badge-danger'};
  document.getElementById('content').innerHTML=`
<div class="flex items-center gap-2 mb-4">
  <button class="btn btn-primary" onclick="openNewPO()">➕ New Purchase Order</button>
  <span class="badge badge-gray ml-auto">${purchaseOrders.length} orders total</span>
</div>
<div class="card">
  <div class="card-body" style="padding:0">
    <div class="table-wrap">
    <table><thead><tr><th>PO #</th><th>Date</th><th>Vendor</th><th>Description</th><th class="text-right">Amount</th><th>Approval 1</th><th>Approval 2</th><th>Supply</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>
    ${purchaseOrders.map(po=>`<tr>
      <td><span style="font-family:monospace;color:#1e40af;font-weight:700">${po.number}</span></td>
      <td class="text-muted">${po.date}</td>
      <td>${po.vendor}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${po.desc}</td>
      <td class="text-right" style="font-family:monospace;font-weight:700">${fmtUSD(po.amount)}</td>
      <td><span class="badge ${po.approval1?'badge-success':'badge-warning'}">${po.approval1?'✓':'⏳'}</span></td>
      <td><span class="badge ${po.approval2?'badge-success':'badge-warning'}">${po.approval2?'✓':'⏳'}</span></td>
      <td><span class="badge ${po.supply?'badge-success':'badge-gray'}">${po.supply?'Done':'Pending'}</span></td>
      <td><span class="badge ${statusCls[po.status]||'badge-gray'}">${po.status}</span></td>
      <td>
        <div class="flex gap-2">
          ${!po.approval1&&po.status==='pending'?`<button class="btn btn-xs btn-success" onclick="approvePO('${po.id}',1)">✓ Appr 1</button>`:''}
          ${po.approval1&&!po.approval2&&po.status==='pending'?`<button class="btn btn-xs btn-success" onclick="approvePO('${po.id}',2)">✓ Appr 2</button>`:''}
          ${po.status==='approved'&&!po.supply?`<button class="btn btn-xs btn-primary" onclick="markSupply('${po.id}')">📦 Supply</button>`:''}
          ${po.status==='pending'?`<button class="btn btn-xs btn-danger" onclick="rejectPO('${po.id}')">✗ Reject</button>`:''}
          <button class="btn btn-xs btn-danger" onclick="deletePO('${po.id}')">🗑</button>
        </div>
      </td>
    </tr>`).join('')}
    </tbody></table>
    </div>
  </div>
</div>`;
}
function openNewPO(){
  openModal('🛒 New Purchase Order',`
<div class="form-group"><label>PO Number</label><input type="text" id="po-num" value="PO-00${purchaseOrders.length+1}"></div>
<div class="form-group"><label>Date</label><input type="date" id="po-date" value="${new Date().toISOString().split('T')[0]}"></div>
<div class="form-group"><label>Vendor Name</label><input type="text" id="po-vendor" placeholder="Vendor / Supplier name"></div>
<div class="form-group"><label>Description</label><input type="text" id="po-desc" placeholder="What is being purchased?"></div>
<div class="form-group"><label>Amount ($)</label><input type="number" id="po-amount" placeholder="0.00" step="0.01"></div>
`,`<button class="btn btn-outline" onclick="closeModal()">Cancel</button>
   <button class="btn btn-primary" onclick="savePO()">Save PO</button>`);
}
function savePO(){
  const num=document.getElementById('po-num').value.trim();
  const date=document.getElementById('po-date').value;
  const vendor=document.getElementById('po-vendor').value.trim();
  const desc=document.getElementById('po-desc').value.trim();
  const amount=parseFloat(document.getElementById('po-amount').value)||0;
  if(!num||!vendor||!desc||!amount){alert('All fields are required.');return;}
  purchaseOrders.push({id:num,number:num,date,vendor,desc,amount,status:'pending',approval1:false,approval2:false,supply:false});
  save();closeModal();renderPO();
}
function approvePO(id,level){
  const po=purchaseOrders.find(p=>p.id===id);if(!po)return;
  if(level===1) po.approval1=true;
  if(level===2){po.approval2=true;if(po.approval1)po.status='approved';}
  save();renderPO();
}
function rejectPO(id){
  const reason=prompt('Rejection reason:');if(!reason)return;
  const po=purchaseOrders.find(p=>p.id===id);if(!po)return;
  po.status='rejected';po.rejectionReason=reason;save();renderPO();
}
function markSupply(id){
  const po=purchaseOrders.find(p=>p.id===id);if(!po)return;
  po.supply=true;save();renderPO();
}
function deletePO(id){
  if(!confirm('Delete this PO?'))return;
  purchaseOrders=purchaseOrders.filter(p=>p.id!==id);save();renderPO();
}

// ============================================================
// MODAL
// ============================================================
function openModal(title,body,footer){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-footer').innerHTML=footer||'';
  document.getElementById('modal-overlay').style.display='flex';
}
function closeModal(){document.getElementById('modal-overlay').style.display='none';}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
  navigate('dashboard');
});
</script>
</body>
</html>
